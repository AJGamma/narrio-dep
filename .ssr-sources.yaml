        summary: "At this point, most people are aware of the benefits of physical exercise. Like with many things we know are good for us, it doesn’t mean we actually act on it: it’s estimated there is between  $400 million and $1.3 billion spent on unused gym memberships in the U.S. only."
        url: "https://nesslabs.com/mental-gym"


